<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyre of Lament</title>
    <!-- This provides the beautiful layout and fonts instantly -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'EB Garamond', serif;
            background-color: #f5f5dc; /* Light Beige */
            color: #2c2c2c; /* Soft Charcoal */
        }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen p-8 md:p-24 flex flex-col justify-between">
    <div class="max-w-2xl mx-auto w-full">
        
        <!-- Header -->
        <header class="mb-16 border-b border-black/10 pb-4">
            <h1 class="text-4xl italic font-light tracking-widest">Lyre of Lament</h1>
        </header>

        <!-- Home Page / Table of Contents -->
        <div id="home-view" class="space-y-6">
            <h2 class="text-sm uppercase tracking-widest opacity-60 mb-8">Contents</h2>
            <ul id="poem-list" class="space-y-4">
                <!-- Your poems will automatically list here -->
            </ul>
        </div>

        <!-- Poem Viewer Page -->
        <div id="poem-view" class="hidden">
            <button onclick="showHome()" class="text-xs uppercase tracking-[0.2em] mb-12 hover:opacity-50 transition-opacity block">
                ← Back to Contents
            </button>
            <article>
                <h2 id="poem-title" class="text-3xl mb-8 italic"></h2>
                <div id="poem-content" class="text-xl opacity-90 leading-relaxed whitespace-pre-line"></div>
            </article>
        </div>
    </div>

    <script>
        // ==========================================
        // --- YOUR POEMS ARE LISTED RIGHT HERE ---
        // ==========================================
        const POEMS = [
            {
                title: "People like us",
                content: `There are people like us.
We are born with a sore
A spot on our soul.
It is tiny in the beginning,
Almost benign, but soon
It turns to a cancer you can’t deny.
It makes us see things
Others can not; we are young
But early, we die and rot.
We break down between stations.
And on moving trains
We get stuck
in our train of thoughts.
We do not belong.
We can not be loved.
There are people like us.`
            },
            {
                title: "Yellow Dress",
                content: `Though the flowers
Were printed on your
Yellow dress, but somehow they
Bloomed in my heart. 
What in the world
You made me feel?
An eternal spring
An orchard of pages
A tree of poems
A bouquet of verses
A lost dewdrop on a petal
A word unsaid.
Though the flowers
Were just printed on your
Yellow dress.`
            }
            // When you want to add a new poem, you'll put a comma here and paste it!
        ];

        const homeView = document.getElementById('home-view');
        const poemView = document.getElementById('poem-view');
        const poemList = document.getElementById('poem-list');
        const poemTitle = document.getElementById('poem-title');
        const poemContent = document.getElementById('poem-content');
        let typewriterInterval;

        // Creates the clickable list on the homepage
        function init() {
            poemList.innerHTML = '';
            POEMS.forEach((poem, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<button onclick="openPoem(${index})" class="text-2xl hover:italic hover:pl-2 transition-all duration-300 text-left">${poem.title}</button>`;
                poemList.appendChild(li);
            });
        }

        // Handles clicking a poem and typing it out
        function openPoem(index) {
            const poem = POEMS[index];
            homeView.classList.add('hidden');
            poemView.classList.remove('hidden');
            poemTitle.innerText = poem.title;
            
            clearInterval(typewriterInterval);
            poemContent.innerText = '';
            let i = 0;
            const text = poem.content;
            
            typewriterInterval = setInterval(() => {
                poemContent.innerText = text.slice(0, i);
                i++;
                if (i > text.length) {
                    clearInterval(typewriterInterval);
                }
            }, 35); // Controls typewriter typing speed
        }

        function showHome() {
            clearInterval(typewriterInterval);
            poemView.classList.add('hidden');
            homeView.classList.remove('hidden');
        }

        // Fire up the website
        init();
    </script>
</body>
</html>
